# Auto-generated by RooDojo migration. DO NOT EDIT MANUALLY.
#
# When this workflow repo is pushed, this action checks out the parent
# RooDojo repo and bumps the submodule pin for THIS workflow to the
# new HEAD. Result: pushes from the engine (or anyone else) to this
# repo automatically appear in RooDojo with no manual coordination.
#
# Required setup (one-time, per workflow repo):
#   1. Create a fine-grained Personal Access Token at
#      github.com/settings/personal-access-tokens with:
#        - Repository access: Remoroo/RooDojo
#        - Permission: Contents (read+write)
#   2. Add the token as a secret named ROODOJO_TOKEN in this repo:
#        gh secret set ROODOJO_TOKEN --repo Remoroo/variant-triage --body "<pat>"
#
# Race conditions: if two workflow repos push at the same instant,
# the second action will lose the push race; the retry loop handles
# this with up to 5 attempts and exponential backoff.

name: Bump pin in RooDojo

on:
  push:
    branches: [main]

  # Manual run from the Actions UI for one-off catchup
  workflow_dispatch:

# Avoid two bumps from this repo running at the same time and
# clobbering each other's commit. (Concurrency from OTHER repos
# is handled by the retry loop below.)
concurrency:
  group: bump-roodojo-variant-triage
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check token is configured
        env:
          TOKEN: ${{ secrets.ROODOJO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::ROODOJO_TOKEN secret is not set in this repo."
            echo "::error::See .github/workflows/bump-roodojo.yml for setup instructions."
            exit 1
          fi

      - name: Checkout RooDojo (parent meta-repo)
        uses: actions/checkout@v4
        with:
          repository: Remoroo/RooDojo
          token: ${{ secrets.ROODOJO_TOKEN }}
          submodules: false
          fetch-depth: 0
          persist-credentials: true

      - name: Bump submodule pin and push (with retry)
        env:
          PIN_PATH: scientific-ml/variant-triage
          NEW_SHA: ${{ github.sha }}
          NEW_SUBJECT: ${{ github.event.head_commit.message }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          git config user.name  "remoroo-bot"
          git config user.email "bot@remoroo.com"

          for attempt in 1 2 3 4 5; do
            echo "::group::Attempt $attempt"
            git fetch origin main --quiet
            git reset --hard origin/main
            git submodule update --init -- "$PIN_PATH"
            ( cd "$PIN_PATH" && git fetch origin "$NEW_SHA" --depth 1 && git checkout "$NEW_SHA" )

            if git diff --quiet -- "$PIN_PATH"; then
              echo "Pin already at ${NEW_SHA:0:10} — nothing to bump."
              exit 0
            fi

            # Squash the head_commit subject onto a single bump line.
            SUBJECT_FIRST=$(printf "%s" "$NEW_SUBJECT" | head -n1 | cut -c1-80)
            git add -- "$PIN_PATH"
            git commit -m "bump: $REPO @ ${NEW_SHA:0:10} — $SUBJECT_FIRST"

            if git push origin main; then
              echo "Pushed bump for $PIN_PATH"
              exit 0
            fi

            echo "::warning::Push lost the race (attempt $attempt). Backing off."
            git reset --hard HEAD~1 || true
            sleep $((attempt * 2))
            echo "::endgroup::"
          done

          echo "::error::Failed to push bump after 5 attempts."
          exit 1
